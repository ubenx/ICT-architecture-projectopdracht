version: "3.8"

services:
  server:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install express socket.io && node /app/server.js"
    configs:
      - source: server_js
        target: /app/server.js
    ports:
      - "3000:3000"
    networks:
      - progress-net

  teacher:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "sleep 5 && npm install socket.io-client && node /app/teacher-dashboard.js"
    configs:
      - source: teacher_dashboard_js
        target: /app/teacher-dashboard.js
    networks:
      - progress-net

  student:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "sleep 8 && npm install socket.io-client && node /app/student-simulator.js"
    configs:
      - source: student_simulator_js
        target: /app/student-simulator.js
    networks:
      - progress-net

configs:
  server_js:
    file: ./server.js
  teacher_dashboard_js:
    file: ./teacher-dashboard.js
  student_simulator_js:
    file: ./student-simulator.js

networks:
  progress-net:
    driver: overlay
