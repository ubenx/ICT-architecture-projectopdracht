version: "3.8"

services:
  mongo:
    image: mongo:7
    networks:
      - poc-net

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "sleep 5 && npm install && node index.js"
    environment:
      - MONGO_URL=mongodb://mongo:27017/gamedb
    networks:
      - poc-net
    depends_on:
      - mongo

networks:
  poc-net: