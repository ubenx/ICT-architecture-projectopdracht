version: "3.8"
 
services:
  sandbox-api:
    image: node:18-alpine
    ports:
      - "3000:3001"
    volumes:
      - ./app:/app
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: sh -c "npm install && node server.js"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
